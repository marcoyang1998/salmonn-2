repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: debug-statements
      - id: end-of-file-fixer
        exclude: ^(assets|outputs)/
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: ^(assets|outputs)/
      - id: trailing-whitespace
        exclude: ^(assets|outputs|salmonn/spear)/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ruff sanity checks
        args: ["--select=E9,F63,F7,F82"]
      - id: ruff-format
        name: ruff format
